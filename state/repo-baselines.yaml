# repo-baselines.yaml — Phase-2 freeze baseline (read-only)
#
# The 5 product repos are UNTOUCHED until Phase 5a. This file records the SHA
# each repo was frozen at, so any ingested item can cite the exact source state
# and the products can be reconstructed without writing anything to them.
#
# No tags are written to the products: a tag is a write that breaks the freeze
# and could trip CI/release hooks. SHA alone reconstructs state. Tags become
# load-bearing only at the Phase-5a carve boundary.
#
# Refs: docs/transformation/Phase-0-audit.md (the PORT worklist),
#       Team Knowledge/tasks/open/phase2-kickoff-decisions.md
#
# Per-task advance tracking (the "pinned-plus-advance" epoch history) is NOT
# encoded yet — that awaits decision 7 in phase2-kickoff-decisions. For now this
# is a single atomic snapshot at the initial freeze.

schema_version: 1
