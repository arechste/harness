# Credential Inventory — harness
#
# SECRET-FREE TRACKING SURFACE. Records credential METADATA only — never a
# value. Pointers (op:// refs, file paths, key labels, public keys) are safe;
# secrets are not. See:
#   - Team Knowledge/Guidelines/GL-002-credential-custody.md
#   - Deliverables/2026-05-30-primer-credential-lifecycle.md  (schema §3, rotation §4)
#
# Maintenance: SENTRY audits expiry; TOWER updates on rotation. Dates YYYY-MM-DD.
# blast-radius: low | medium | high  (what an attacker gets if THIS leaks)
# verified: machine = confirmed value-free via CLI; human = needs principal to read from a UI

meta:
  last-surveyed: 2026-05-30
  surveyed-by: TOWER
  machine: fragtnix
  user: arechste
  notes: >
    First inventory pass, evidence-based (CLI survey, value-free). KEY FINDING:
    the live credential hub on this machine is the **1Password SSH agent**
    (SSH_AUTH_SOCK=~/.1password/agent.sock) — SSH secret key material is served
    by 1Password and never touches disk (~/.ssh/ holds only the .pub). Global git is
    ALREADY configured for SSH commit signing (commit.gpgsign=true,
    gpg.format=ssh) via a dedicated `id_ed25519_github_sign_key`. INSIDE harness,
    GL-001's .gitconfig overrides this to gpgsign=false (team commits unsigned).
    The sops/age operational tier from GL-002 is NOT YET PROVISIONED in harness
    (no harness/.sops.yaml, no state/credentials/*.sops.yaml) — though the
    binaries (op 2.34.0, sops 3.13.1, age v1.3.1) are installed and two product
    repos already carry their own .sops.yaml (dotfiles, mac-organizer).

# ---------------------------------------------------------------------------
# GitHub access tokens
# ---------------------------------------------------------------------------
credentials:
  - id: gh-cli-oauth-arechste
    name: "GitHub OAuth token — gh CLI (account: arechste)"
    type: github-oauth-token        # gho_ prefix = `gh auth login` OAuth, not a managed PAT
    scope: "gist, project, read:org, repo, workflow"
    issuer: github.com
    created: unknown
    expires: n/a                    # OAuth tokens don't expire on a fixed schedule; revoke via gh
    owner: principal
    last-rotated: unknown
    blast-radius: high              # 'repo' + 'workflow' scope across all the principal's repos
    location-canonical: "macOS keyring via gh (~/.config/gh/hosts.yml)"
    location-operational: "same — not mirrored to disk in plaintext"
    verified: machine
    notes: "Active gh account (confirmed `gh api user` -> arechste). Rotation = `gh auth refresh` or re-login. Broad classic-OAuth scopes; candidate to narrow toward fine-grained PAT later."

  # ---------------------------------------------------------------------------
  # SSH keys — served by the 1Password SSH agent (NOT on disk). Public-key /
  # label metadata only. These are the agent's offered identities.
  # ---------------------------------------------------------------------------
  - id: ssh-github-sign
    name: "SSH key — id_ed25519_github_sign_key (git commit signing)"
    type: ssh-ed25519
    scope: "git commit/tag signing; matches ~/.ssh/allowed_signers (769693+arechste@users.noreply.github.com)"
    issuer: "1Password (agent-served)"
    created: unknown
    expires: n/a
    owner: principal
    last-rotated: unknown
    blast-radius: high              # signing identity; forged signatures if leaked
    location-canonical: "1Password SSH agent (~/.1password/agent.sock)"
    location-operational: "agent-only; secret key material never on disk"
    verified: machine
    notes: "Global git user.signingkey points here (gpg.format=ssh, commit.gpgsign=true). Inside harness, gpgsign=false per GL-001 — so this key signs the principal's NON-harness commits and would sign harness merges if/when GL-006 adopts team signing."

  - id: ssh-github-auth
    name: "SSH key — id_ed25519_github_auth_key (git auth)"
    type: ssh-ed25519
    scope: "GitHub SSH authentication"
    issuer: "1Password (agent-served)"
    created: unknown
    expires: n/a
    owner: principal
    last-rotated: unknown
    blast-radius: high
    location-canonical: "1Password SSH agent (~/.1password/agent.sock)"
    location-operational: "agent-only; secret key material never on disk"
    verified: machine
    notes: "Auth identity for github.com over SSH. (Note: harness gh uses HTTPS+OAuth, not this key.)"

  - id: ssh-ntnxlab
    name: "SSH key — id_ed25519_ale_ntnxlabch"
    type: ssh-ed25519
    scope: "ntnxlab.ch host access (see ~/.ssh/ssh_config_ntnxlab_ch)"
    issuer: "1Password (agent-served)"
    created: unknown
    expires: n/a
    owner: principal
    last-rotated: unknown
    blast-radius: medium
    location-canonical: "1Password SSH agent (~/.1password/agent.sock)"
    location-operational: "agent-only"
    verified: machine
    notes: "Lab/infra host access; outside harness scope but inventoried for completeness."

  - id: ssh-ntnxlab-home-rsa
    name: "SSH key — id_ale_home_ntnxlabch (RSA-2048)"
    type: ssh-rsa-2048
    scope: "ntnxlab home host access"
    issuer: "1Password (agent-served)"
    created: unknown
    expires: n/a
    owner: principal
    last-rotated: unknown
    blast-radius: medium
    location-canonical: "1Password SSH agent (~/.1password/agent.sock)"
    location-operational: "agent-only"
    verified: machine
    notes: "RSA-2048 — weakest key in the set; candidate to retire/upgrade to ed25519 on next rotation."

  - id: ssh-home-packer
    name: "SSH key — id_ed25519_ale_home_packer"
    type: ssh-ed25519
    scope: "Packer build host access (home lab)"
    issuer: "1Password (agent-served)"
    created: unknown
    expires: n/a
    owner: principal
    last-rotated: unknown
    blast-radius: medium
    location-canonical: "1Password SSH agent (~/.1password/agent.sock)"
    location-operational: "agent-only"
    verified: machine
    notes: "Home-lab automation; outside harness scope."

  - id: ssh-service-terraform
    name: "SSH key — service_terraform (RSA-3072)"
    type: ssh-rsa-3072
    scope: "Terraform service automation"
    issuer: "1Password (agent-served)"
    created: unknown
    expires: n/a
    owner: principal
    last-rotated: unknown
    blast-radius: high              # service automation key; broad infra reach if leaked
    location-canonical: "1Password SSH agent (~/.1password/agent.sock)"
    location-operational: "agent-only"
    verified: machine
    notes: "Service/automation identity (not interactive). Outside harness scope but high blast-radius; flag for rotation policy."

# ---------------------------------------------------------------------------
# Negative findings — credential stores checked and NOT present (good hygiene)
# ---------------------------------------------------------------------------
not-present:
  - "~/.netrc"
  - "~/.npmrc"
  - "~/.pypirc"
  - "~/.docker/config.json"
  - "~/.aws/credentials"
  - "harness/.sops.yaml (GL-002 operational tier not yet provisioned in harness)"
  - "harness/state/credentials/*.sops.yaml (none yet)"

# ---------------------------------------------------------------------------
# OPEN ITEMS — known/likely to exist but needing a principal step to confirm.
# Principal reads metadata from a UI; NEVER pastes a secret value here.
# ---------------------------------------------------------------------------
open-items:
  - id: github-fine-grained-pats
    why: "Principal stated long-lived PAT(s) exist. None found on this machine (gh uses OAuth). They may live only in 1Password / GitHub settings."
    where-to-look: "https://github.com/settings/tokens (classic) + /settings/tokens?type=beta (fine-grained), account arechste"
    capture: "per token: name, scope/repos, created, expires, last-used -> add a credentials[] entry. NEVER the value."
    blast-radius: high
    status: needs-principal

  - id: 1password-vaults-and-harness-team
    why: "1P is the hub but `op` CLI is not signed in non-interactively (op account list hung). GL-002 assumes a `harness-team` vault — existence unconfirmed."
    where-to-look: "1Password app: enable CLI/desktop integration, then `op vault list`; confirm whether `harness-team` vault + age-key/github-pat items exist."
    capture: "vault names; per item: title, category, created/updated, expires tag. Metadata only."
    blast-radius: high
    status: needs-principal

  - id: age-key-and-sops-tier
    why: "GL-002 operational tier (age key + harness/.sops.yaml) is not provisioned in harness, though binaries are installed and 2 product repos use sops."
    where-to-look: "Decision: provision per GL-002 bootstrap, OR revise GL-002 to match the 1Password-SSH-agent reality (which may make the sops/age tier redundant for some uses)."
    capture: "n/a until decided"
    blast-radius: high
    status: needs-decision
