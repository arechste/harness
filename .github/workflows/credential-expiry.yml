name: credential-expiry

on:
  schedule:
    - cron: '0 8 * * 1'  # weekly Monday 08:00 UTC (offset from the 07:00 doc/link cluster)
  workflow_dispatch:

jobs:
  expiry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq (mikefarah v4)
        run: |
          YQ_VERSION="v4.44.3"
          curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Check credential expiry
        run: bash ci/scripts/check-credential-expiry.sh
