name: diagram-parse

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mermaid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli
      - name: Validate Mermaid blocks
        run: bash ci/scripts/check-mermaid.sh
