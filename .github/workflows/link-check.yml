name: link-check

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'  # weekly Monday 07:00 UTC
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-path repos
            --exclude-path node_modules
            './**/*.md'
          fail: false  # Phase 2: forward-references expected; flip to true once mature
